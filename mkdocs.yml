site_name: ShinuAILabs-MasteryHub
site_description: A community learning engine for Quality Engineers mastering AI
site_url: https://masteryhub.shinuailabs.com
repo_url: https://github.com/shinuailabs/ShinuAILabs-MasteryHub
edit_uri: edit/main/docs/
copyright: Built with ❤️ by Shinu AI Labs

theme:
  name: material
  palette:
    primary: deep orange
    accent: deep orange
  logo: assets/logo.png
  favicon: assets/logo.png
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - search.highlight
    - search.suggest
  icon:
    repo: fontawesome/brands/github

extra_css:
  - assets/extra.css
extra_javascript:
  - assets/visitor-modal.js
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/shinuailabs
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/in/shinoj-narayan
    - icon: fontawesome/brands/youtube
      link: https://youtube.com/@shinuailabs

markdown_extensions:
  - admonition
  - codehilite
  - pymdownx.superfences
  - pymdownx.tabbed
  - pymdownx.emoji
  - toc:
      permalink: true

nav:
  - Home: index.md
  - QE-AI-Track - AI for QE:
    - Overview: qe-ai-track/index.md
    - LLM Basics: qe-ai-track/llm-basics.md
    - Prompt Engineering: qe-ai-track/prompt-engineering.md
    - Job Assistant AI: qe-ai-track/job-assistant-ai.md
    - AI Agents: qe-ai-track/ai-agents.md
    - AI Agents (n8n): qe-ai-track/ai-agents-n8n.md
    - AI Agents (LangFlow): qe-ai-track/ai-agents-langflow.md
    - Vibe Coding: qe-ai-track/vibe-coding.md
    - RAG: qe-ai-track/rag.md
    - Multi-Source QA Copilot: qe-ai-track/multi-source-qa-copilot.md
    - MCP Basics: qe-ai-track/mcp-basics.md
    - Python for QA: qe-ai-track/python-for-qa.md
    - MCP Creation: qe-ai-track/mcp-creation.md
    - CrewAI Agents: qe-ai-track/crewai-agents.md
    - CrewAI QA Pipeline: qe-ai-track/crewai-qa-pipeline.md
    - Production QA Pipeline: qe-ai-track/production-qa-pipeline.md
    - DeepEval: qe-ai-track/deepeval.md
    - Browser Pilot: qe-ai-track/browser-pilot.md
    - LangChain: qe-ai-track/langchain.md
  - Playwright-Pro-Track:
    - Overview: playwright-pro-track/index.md
    - JavaScript: playwright-pro-track/javascript.md
    - TypeScript: playwright-pro-track/typescript.md
    - Playwright Fundamentals: playwright-pro-track/playwright-fundamentals.md
    - Playwright Advanced: playwright-pro-track/playwright-advanced.md
    - POM: playwright-pro-track/pom.md
    - Cucumber BDD: playwright-pro-track/cucumber-bdd.md
    - Docker: playwright-pro-track/docker.md
    - Jenkins: playwright-pro-track/jenkins.md
    - GitHub Actions: playwright-pro-track/github-actions.md
    - AI Testing: playwright-pro-track/ai-testing.md
    - AI Projects: playwright-pro-track/ai-projects.md
    - Modern Patterns: playwright-pro-track/modern-patterns.md
    - Cloud Infrastructure: playwright-pro-track/cloud-infrastructure.md
    - AI Agents & MCP: playwright-pro-track/ai-agents-mcp.md
    - Interview & Career: playwright-pro-track/interview-career.md
  - Community: community.md
  - Contributing: contributing.md
