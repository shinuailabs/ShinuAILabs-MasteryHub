site_name: ShinuAILabs-MasteryHub
site_description: A community learning engine for Quality Engineers mastering AI
site_url: https://masteryhub.shinuailabs.com
repo_url: https://github.com/shinuailabs/ShinuAILabs-MasteryHub
edit_uri: edit/main/docs/
copyright: Built with ❤️ by Shinu AI Labs

theme:
  name: material
  palette:
    primary: deep orange
    accent: deep orange
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - search.highlight
    - search.suggest

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/shinuailabs
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/in/shinoj-narayan
    - icon: fontawesome/brands/youtube
      link: https://youtube.com/@shinuailabs

markdown_extensions:
  - admonition
  - codehilite
  - pymdownx.superfences
  - pymdownx.tabbed
  - pymdownx.emoji
  - toc:
      permalink: true

nav:
  - Home: index.md
